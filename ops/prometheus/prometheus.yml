global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: travel-any-api
    metrics_path: /metrics
    static_configs:
      - targets:
          # 本地开发时后端通常直接跑在宿主机上，不在 docker compose 的 api 容器里。
          # 对 Docker Desktop (macOS) 使用 host.docker.internal 访问宿主机。
          - host.docker.internal:6688

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
