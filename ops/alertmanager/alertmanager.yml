# Alertmanager 路由配置
#
# 当前为占位 receiver：告警会在 Alertmanager UI(:9093) 与 Prometheus /alerts
# 页面可见，但不外发。接 Slack / 邮件 / 钉钉时，在 receivers 下补
# slack_configs / email_configs / webhook_configs 即可，路由无需改动。

route:
  receiver: default
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: default
    # 示例（按需启用并填入真实 webhook）：
    # webhook_configs:
    #   - url: https://your-domain.example/alert-webhook
