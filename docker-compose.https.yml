services:
  frontend:
    ports:
      - "80:80"
      - "443:443"
    environment:
      FRONTEND_SERVER_NAME: ${FRONTEND_SERVER_NAME:-www.restbay-aitravel.com}
      BACKEND_ORIGIN: http://api:6688
      BACKEND_HOST: api:6688
    volumes:
      - ./ops/nginx/https.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./ops/certs:/etc/nginx/certs:ro

  grafana:
    environment:
      GF_SERVER_DOMAIN: ${FRONTEND_SERVER_NAME:-www.restbay-aitravel.com}
      GF_SERVER_ROOT_URL: https://${FRONTEND_SERVER_NAME:-www.restbay-aitravel.com}/grafana/

  prometheus:
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.external-url=https://${FRONTEND_SERVER_NAME:-www.restbay-aitravel.com}/prometheus/"
      - "--web.route-prefix=/"
      - "--web.enable-lifecycle"
