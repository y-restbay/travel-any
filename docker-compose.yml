services:
  api:
    build:
      context: ./backend
    container_name: travel-any-api
    ports:
      - "6688:6688"
    environment:
      DATABASE_URL: sqlite:////data/wanderbot.db
      RAG_CHROMA_PATH: /data/storage/chroma
      RAG_BM25_PATH: /data/storage/bm25_index.json
    volumes:
      - api-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:6688/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: travel-any-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.0.0
    container_name: travel-any-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_BASIC_ENABLED: "false"
      GF_USERS_DEFAULT_THEME: light
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  api-data:
  prometheus-data:
  grafana-data:
