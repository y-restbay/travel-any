services:
  api:
    build:
      context: ./backend
    container_name: travel-any-api
    env_file:
      - ./backend/.env
    ports:
      - "6688:6688"
    environment:
      DATABASE_URL: sqlite:////data/wanderbot.db
      RAG_CHROMA_PATH: /data/storage/chroma
      RAG_BM25_PATH: /data/storage/bm25_index.json
    volumes:
      - api-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:6688/api/health', timeout=3).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AMAP_JS_KEY: ${VITE_AMAP_JS_KEY:-}
        VITE_AMAP_SECURITY_JS_CODE: ${VITE_AMAP_SECURITY_JS_CODE:-}
    container_name: travel-any-frontend
    ports:
      - "80:80"
    environment:
      BACKEND_ORIGIN: http://api:6688
      BACKEND_HOST: api:6688
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: travel-any-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    expose:
      - "9090"
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
      alertmanager:
        condition: service_started

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: travel-any-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    volumes:
      - ./ops/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager

  grafana:
    image: grafana/grafana:11.0.0
    container_name: travel-any-grafana
    expose:
      - "3000"
    environment:
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_BASIC_ENABLED: "false"
      GF_USERS_DEFAULT_THEME: light
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - frontend

volumes:
  api-data:
  prometheus-data:
  alertmanager-data:
  grafana-data:
